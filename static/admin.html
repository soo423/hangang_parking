<!-- 공통 API 유틸리티 로드 -->
<script src="/static/js/api.js"></script>
<script>
    const USER_PAGE_SIZE        = 15;
    const RESERVATION_PAGE_SIZE = 15;

//현재 검색 키워드(회원 검색에서 사용)
let userSearchKeyword = "";
// JWT 디코딩으로 관리자 권한 확인
function checkAdminAccess() {
    const token = getToken();
    if(!token) {
        alert("관리자 로그인이 필요합니다");
        window.location.href = "/static/index.html";
        return false;
    }
    const payload = getPayload();
    if(!payload) {
        alert("유효하지 않은 토큰입니다");
        window.location.href = "/static/index.html";
        return false;
    }
    if(payload.role !== "admin"){
        alert("관리자 권한이 필요합니다");
        window.location.href = "/static/index.html";
        return false;
    }
    document.querySelector("#adminNameDisplay").textContent = `관리자 (ID: ${payload.user_id})`;
    return true;
}
// 통계 카드 4개 로드
async function loadSummaryCards(){
    try{
        const s = await apiGet("/admin/stats/summary");
        document.querySelector("#totalUsers").textContent = s.total_users.toLocaleString();
        document.querySelector("#totalReservations").textContent = s.total_reservations.toLocaleString();
        document.querySelector("#todayReservations").textContent = s.today_reservations.toLocaleString();
        document.querySelector("#activeReservations").textContent = s.active_reservations.toLocaleString();
    } catch (error) {
        console.error("통계 카드 로드 실패:", error.message);
    }
}
// 값들을 상대 비교해 4단계 색으로 매핑
const GRADE_COLORS = [
    "rgba(25,135,84,0.8)",
    "rgba(13,110,253,0.8)",
    "rgba(255,193,7,0.8)",
    "rgba(220,53,69,0.8)"
];
const GRADE_NAMES = ["여유", "보통", "붐빔", "매우 붐빔"];
function relativeColors(values){
    // 이 차트에 들어온 값들 중 최소 최대를 구한다
    const min = Math.min(...values);
    const max = Math.max(...values);
    const span = (max-min) || 1; // 전부 같은 값이면 0나누기 방지로 1
    const step = span / 4; // '최소 ~ 최대'를 4등분해서 상대적으로 낮음 -> 높음을 색으로 표현
    const bucketOf = (v) => Math.min(3,Math.floor((v-min)/step)); // 각 값이 몇 번째 구간에 드는지 계산
    const colors = values.map(v => GRADE_COLORS[bucketOf(v)]); // 값마다 등급 색 매핑
    // 범례 데이터
    const legend = GRADE_NAMES.map((name, i) => ({
        label: name,
        color: GRADE_COLORS[i],
        range: `${Math.round(min + step * i)}~${Math.round(min + step * (i + 1))}%`
    }));
    return{colors, legend};
}
// 범례를 지정한 컨테이너에 그림 (색 네모 + 이름 + 값 범위)
function renderLegend(containerId, legend){
    const el = document.getElementById(containerId);
    if(!el) return;
    const items = legend.map(g => `
        <span class = "d-inline-flex align-items-center me-3 mb-1 small">
            <span style="display: inline-block; width: 12px; height: 12px; border-radius: 3px;
                        background: ${g.color}; margin-right: 4px;"></span>
            ${g.label} <span class="text-muted ms-1">(${g.range})</span>
        </span>
    `).join("");
    el.innerHTML = items +
        `<div class="text-muted mt-1" style="font-size:0.75rem;">
            색은 이 차트 내 상대 비교입니다(예측 화면의 절대 등급과 기준이 다를 수 있음)
        </div>`;
}

// 요일별 평균 회전율 Bar Chart
async function loadDailyChart() {
    try{
        const data = await apiGet("/admin/stats/daily");
        document.querySelector("#dailySpinner").classList.add("d-none");
        document.querySelector("#dailyChartWrap").classList.remove("d-none");
        const labels = data.map(d => `${d.day_name}요일`);
        const values = data.map(d => d.avg_occupancy_pct);
        const {colors, legend} = relativeColors(values);
        renderLegend("dailyLegend", legend);
        new Chart(document.querySelector("#dailyChart"), {
            type: 'bar',
            data: {
              labels,
              datasets: [{
                label: '평균 회전율(%)',
                data: values,
                backgroundColor: colors,
                borderRadius: 6
              }]
            },
            options: {
              responsive: true, maintainAspectRatio: false,
              plugins: {legend: {display: false}},
              scales: {y: {beginAtZero: true, ticks: {callback: v => `${v}%`}}}
            }
        });
    } catch (e){
        document.querySelector("#dailySpinner").innerHTML =
            `<div class="text-danger small">로드 실패: ${e.message}</div>`;
    }
}

    } catch (e){
        document.querySelector("#hourlySpinner").innerHTML =

// 월별 평균 혼잡도 Bar Chart
async function loadMonthlyChart() {
    try {
        const data = await apiGet("/admin/stats/monthly");

        document.querySelector("#monthlySpinner").classList.add("d-none");
        document.querySelector("#monthlyChartWrap").classList.remove("d-none");

        // x축 라벨("1월"~"12월")과 y축 값(평균 회전율%) 분리
        const labels = data.map(d=>`${d.month}월`);
        const values = data.map(d=> d.avg_occupancy_pct);

        // 상대 비교: 값 범위 4등분 색상 + 범례
        const {colors, legend} = relativeColors(values);
        renderLegend("monthlyLegend", legend);

        new Chart(document.querySelector("#monthlyChart"), {
            type: 'bar',
            data: {
              labels,
              datasets: [{
                label: '평균 회전율(%)',
                data: values,
                backgroundColor: colors,
                borderRadius: 6
              }]
            },
            options: {
              responsive: true, maintainAspectRatio: false,
              plugins: {legend: {display: false}},
              scales: {y: {beginAtZero: true, ticks: {callback: v => `${v}%`}}}
            }
        });
    } catch (e)  {
        document.querySelector("#monthlySpinner").innerHTML =
            `<div class="text-danger small">로드 실패: ${e.message}</div>`;
    }
}

//
function renderPagination(ulId, total, currentPage, pageSize, loadFn) {
    const totalPages = Math.ceil(total / pageSize);
    const ul = document.getElementById(ulId);
    if(totalPages <= 1) {ul.innerHTML = ""; return;}

    let html = "";
    for(let i = 1; i <= totalPages; i++) {
        html += `
            <li class="page-item ${i === currentPage ? "active" : ""}">
                <button class="page-link" onclick="(${loadFn.toString()})(${i})">
                    ${i}
                </button>
        </li>`;
    }
    ul.innerHTML = html;
}

//회원 목록 불러오기(검색 포함)
async function loadUsers(page = 1, keyword= "") {
    try{//GET/admin/users?page=
        const url = keyword
            ? `/admin/users?page=${page}&size=${USER_PAGE_SIZE}&search=${encodeURIComponent(keyword)}`
            : `/admin/users?page=${page}&size=${USER_PAGE_SIZE}`;
        const data = await apiGet(url);
        document.querySelector("#userTotalBadge").textContent = `총 ${data.total}명`;
        if(data.items.length === 0) {
            document.querySelector("#userEmpty").classList.remove("d-none");
            document.querySelector("#userTableBody").innerHTML = "";
        } else {
            document.querySelector("#userEmpty").classList.add("d-none");
            const tbody = document.querySelector("#userTableBody");
            tbody.innerHTML = data.items.map(u => `
                <tr>
                    <td class="text-muted">${u.id}</td>
                    <td>${u.email}</td>
                    <td>${u.name}</td>
                    <td><span class="badge ${u.role === "admin" ? "text-bg-danger" : "text-bg-secondary"}">
                        ${u.role}
                        </span>
                    </td>
                    <td class="small">${fmtData(u.create_at)}</td>
                </tr>
            `).join("");
        }
        renderPagination("userPagination", data.total, page, USER_PAGE_SIZE, p => loadUsers(p, userSearchKeyword));
    } catch(e) {
            console.error("회원 로드 실패:", e.message);
    }
}

//예약 목록 로드
async function loadReservations(page = 1) {
    document.querySelector("#reservationSpinner").classList.remove("d-none");
    document.querySelector("#reservationTableWrap").classList.remove("d-none");
    try {
        const data = await apiGet(`/admin/reservations?page=${page}&size=${RESERVATION_PAGE_SIZE}`);
        document.querySelector("#reservationTotalBadge").textContent = `총 ${data.total}건`;

        //예약 상태별 Badge 색상
        const statusBadge = {
            "active"    : "text-bg-success",
            "completed" : "text-bg-primary",
            "cancelled" : "text-bg-secondary"
        };

        if(data.items.length === 0) {
            document.querySelector("#reservationEmpty").classList.remove("d-none");
            document.querySelector("#reservationTableBody").innerHTML = "";
        } else {
            document.querySelector("#reservationEmpty").classList.add("d-none");
            const tbody = document.querySelector("#reservationTableBody");
            tbody.innerHTML = data.items.map(r => `
                <tr>
                    <td class="text-muted">${r.id}</td>
                    <td>${r.user_name}</td>
                    <td>${r.parking_name}</td>
                    <td>${fmtData(r.reservation_date)}</td>
                    <td><span class="badge ${statusBadge[r.status] || "text-bg-secondary"}">
                        ${r.status}
                        </span>
                    </td>
                    <td class="small">${fmtData(r.created_at)}</td>
                </tr>
            `).join("");
        }
        renderPagination("reservationPagination", data.total, page, RESERVATION_PAGE_SIZE, p => loadReservations(p));
    } catch(e) {
        console.error("예약 로드 실패:", e.message);
        document.querySelector("#reservationEmpty").classList.remove("d-none");
    } finally {
        document.querySelector("#reservationSpinner").classList.add("d-none");
    }
}
//날짜 포맷 변환 유틸리티
    function fmtData(s) {
        if(!s) return "-";
        return String(s).slice(0, 16).replace("T", " ");
    }

//섹션 전환 + 사이드바 활성화
function showSection(name, el) {
    //모든 섹션 숨기기
    ["statsSection", "usersSection", "reservationsSection"].forEach(id => document.getElementById(id).classList.add("d-none"));

    //선택한 섹션만 표시
    document.getElementById(`${name}Section`).classList.remove("d-none");

    //사이드바 active 클래스 제거
    document.querySelectorAll("#sidebar .nav-link").forEach(a => a.classList.remove("active"));
    if(el) el.classList.add("active");

    //Breadcrumb 업데이트
    const names = {stats: "통계 대시보드", users: "회원 관리", reservations: "예약 관리"};
    document.querySelector("#breadcrumbCurrent").textContent = names[name] || name;

    //모바일 Offcanvas 닫기
    const offcanvas = bootstrap.Offcanvas.getInstance(document.querySelector("#mobileSidebar"));
    if(offcanvas) offcanvas.hide();
}

document.querySelectorAll("#sidebar .nav-link").forEach(link => {
