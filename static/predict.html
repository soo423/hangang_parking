<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예측하기 - 한강공원 주차장</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        #resultCard {display: none;} /*결과 카드 - 기본 숨김 상태*/
        .progress {height: 28px; border-radius: 14px;}
        .progress-bar {transition: width 0.6s ease, background-color 0.4s ease; font-size: 0.9rem; font-weight: bold;}
        .occupancy-number {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
        }
    </style>
</head>
<body>
<div id="navbar-placeholder"></div>

<!-- 메인 콘텐츠 -->
<div class = "container mt-4" style="max-width: 680px;">
    <!-- 페이지 제목 -->
    <div class="mb-4">
        <h2 class="fw-bold">혼잡도 예측</h2>
        <p class="text-muted mb-0">
            주차장과 날짜를 선택하면 ML 모델이 혼잡도를 예측합니다.
        </p>
    </div>
    <!-- 입력 폼 카드 -->
    <div class="card shadow-sm mb-4">
      <div class="card-body p-4">
          <!-- 주차장 선택 -->
        <div class="mb-3">
            <label class="form-label fw-bold" for="lotSelect"><i class="bi bi-p-square-fill"></i>주자창 선택</label>
            <select class="form-select" id="lotSelect">
                <option selected>주차장을 선택하세요</option>
                <!-- GET /parking-lots API 응답으로 옵션 동작 생성 -->
            </select>
        </div>
          <!-- 날짜 선택 -->
          <div class ="mb-4">
              <label class="form-label fw-bold" for="dateInput"><i class="bi bi-calendar-date"></i>예측 날짜</label>
              <input type="date" class="form-control" id="dateInput">
              <div class="form-text text-muted">오늘부터 최대 1년 후까지 예측 가능합니다</div>
          </div>
          <!-- 혼잡도 예측 하기 -->
          <button class="btn btn-primary w-100 fw-bold py-2" id="predictBtn">혼잡도 예측하기</button>
          <div class="alert alert-danger mt-3 d-none" id="errorAlert"></div> <!-- 오류 메시지 -->
      </div>
    </div>
    <!-- 예측 중 로딩 표시 -->
    <div class="text-center py-4 d-none" id="loadingArea">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">예측 중...</span>
        </div>
        <p class="mt-2 text-muted">ML 모델이 혼잡도를 예측하는 중...</p>
    </div>
    <!-- 예측 결과 카드 -->
    <div class="card shadow-sm" id="resultCard">
        <div class="card-body p-4">
            <!-- 결과 헤더 -->
            <div class="d-flex align-items-center justify-content-between mb-3">
                <div>
                    <!-- 주차장명 JS로 동작 설정 -->
                    <h5 class ="fw-bold mb-0" id="resultLotName">-</h5>
                    <!-- 날짜 + 용량 : js로 동작 설정 -->
                    <small class="text-muted" id="resultInfo">-</small>
                </div>
                <span class="badge fs-6" id="resultBadge">-</span><!-- 혼잡도 단계 -->
            </div>
            <!-- 혼잡도 수치 -->
            <div class="text-center mb-3">
                <div class="occupancy-number" id="resultPct">-</div>
                <div class="text-muted small mt-1">예측 혼잡도</div>
            </div>
            <!-- progress bar(혼잡도 막대) -->
            <div class="progress mb-3">
              <div id="resultBar" class="progress-bar" role="progressbar"
                   aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" style="width: 0%"></div>
            </div>
            <!-- 잔여 면수 정보 -->
            <div class="row text-center g-3">
                <div class="col-6">
                    <div class="border rounded p-2">
                        <div class="fw-bold fs-4" id="resultSpaces">-</div>
                        <div class="text-muted small">예측 잔여 면수</div>
                    </div>
                </div>
                <div class="col-6">
                    <div class="border rounded p-2">
                        <div class="fw-bold fs-4" id="resultCapacity">-</div>
                        <div class="text-muted small">총 주차면수</div>
                    </div>
                </div>
            </div>
            <!-- 예약하기 버튼(로그인 상태에서만 활성화) -->
            <div class="mt-3">
                <button class="btn btn-outline-primary w-100" id="reserveBtn">
                    <i class="bi bi-calendar-date"></i>이 날짜로 예약
                </button>
            </div>
        </div> <!--/card-body -->
    </div> <!-- /resultCARD -->
</div> <!-- /conatiner -->
<div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
<!-- 공통 API 유틸리티 로드 -->
<script src="/static/js/api.js"></script>
<script src="/static/js/layout.js"></script>

<script>
//전역변수 - 현재 예측 결과 저장(예약 버튼에서 사용)
let currentPrediction = null; //마지막 예측 응답 객체 저장
//드롭다운 옵션 동작 생성
async function populateLotSelect() {
    try {
        const data = await apiGet("/parking-lots?page=1&size=11");
        const select = document.querySelector("#lotSelect");
        //각 주차장을 <option value="2"> 여의도 한강공원 (주차장 총 1000면) </option>으로 추가
        data.items.forEach(lot => {
            const opt = document.createElement("option");
            opt.value = lot.id;     //value : API 요청에 사용을 lot_id
            opt.text  = `${lot.lot_name} (총 ${lot.capacity}면)`;
            select.appendChild(opt);
        })
    } catch(error) {
        //서버 미연결 등 오류 시 기본 옵션 유지
        console.error("주차장 목록 로드 실패:", error.message);
    }
}

//날짜 기본값 오늘로 설정
function setDefaultDate() {
    const today = new Date();
    document.querySelector("#dateInput").value = today.toISOString().split("T")[0]; //"2026-07-02T00:00:00:000Z"
}

//날짜 선택 가능 범위 제한
function setDateRange() {
    const today = new Date();
    const maxDate = new Date(today);
    maxDate.setFullYear(today.getFullYear() +1);

    const dateInput = document.getElementById("dateInput");
    //min 속성
    dateInput.min = today.toISOString().split("T")[0]; //2026-07-02
    //max 속성 : 선택 가능한 최대 날짜(1년 후)
    dateInput.max = maxDate.toISOString().split("T")[0]; //2027-07-02
}

//URL 파라미터로 주차장 자동 선택
function checkUrlParam() {
    const params = new URLSearchParams(window.location.search); //URL의 쿼리 파라미터를 파싱하는 WebAPI("?lot_id=1" 부분)
    const lotId = params.get("lot_id"); //lot_id 파라미터 값 추출
    if(lotId) {
        const select = document.querySelector("#lotSelect");
        select.value = lotId; //드롭다운에서 해당 lot_id 선택
    }
}

//페이지 초기화
async function initPage() {
    await populateLotSelect(); //드롭다운 옵션 생성
    setDefaultDate();          //날짜 기본값 설정
    setDateRange();            //날짜 선택 범위 제한
    checkUrlParam();           //URL 파라미터로 주차장 자동 선택
    updateNavbar();            //Navbar 로그인 상태 반영
}

//  Navbar 인증 상태 전환
function updateNavbar() {
    const loginBtn        = document.querySelector("#loginBtn");
    const logoutBtn       = document.querySelector("#logoutBtn");
    const userNameDisplay = document.querySelector("#userNameDisplay");

    if(isLoggedIn()) { // 로그인 상태 처리
        loginBtn.classList.add("d-none");           // 로그인 버튼 숨김
        logoutBtn.classList.remove("d-none");       // 로그아웃 버튼 표시
        userNameDisplay.classList.remove("d-none"); // 이름 표시

        // localStorage에서 저장해둔 사용자 이름을 꺼내서 표시
        const userName = localStorage.getItem("user_name") || "사용자";
        userNameDisplay.textContent = `${userName}님`;
    } else { // 비로그인 상태 처리
        loginBtn.classList.remove("d-none");     // 로그인 버튼 표시
        logoutBtn.classList.add("d-none");       // 로그아웃 버튼 숨김
        userNameDisplay.classList.add("d-none"); // 이름 숨김
        userNameDisplay.textContent = "";        // 텍스트 초기화
    }
}

// Alert 오류 메시지 표시
function showError(message) {
    const alert = document.querySelector("#errorAlert"); //div
    alert.textContent = `${message}`;
    alert.classList.remove("d-none"); //표시
}

// Alert 오류 메시지 숨김
function hideError() {
    document.querySelector("#errorAlert").classList.add("d-none");
}

//Spinner 표시, 숨김
function showLoading(show) {
    document.querySelector("#loadingArea").classList.toggle("d-none", !show); //조건이 false -> d-none 제거
    document.querySelector("#predictBtn").disabled = show; //버튼 비활성화 : 중복 클릭 방지
}



//예측 버튼 클릭
async function handlePredict() {
    const lotId = document.querySelector("#lotSelect").value;
    const date  = document.querySelector("#dateInput").value;

    //클라이언트 유효성 검사
    if(!lotId) {
        showError("주차장을 선택해주세요.");
        return;
    }
    if(!date) {
        showError("날짜를 선택해주세요.");
        return;
    }

    //오류 메시지 초기화
    hideError();

    //로딩 표시
    showLoading(true);

    try {
        const result = await callPredictAPI(parseInt(lotId), date);
        //전역변수에 저장(예약 버튼에서 사용)
        currentPrediction = result;
        //결과 카드 렌더링
        renderResult(result);
    } catch(error) {
        //503 : ML 모델 미로드 / 404 : 주차장 없음
        showError(error.message || "예측에 실패했습니다. 서버 상태를 확인하세요.");
    } finally {
        // 성공, 실패 무관하게 항상 로딩 숨김
            showLoading(false);

    }
}

//POST /predict 호출
async function callPredictAPI(lotId, date) {
    const result = await apiPost("/predict", {
        lot_id      : lotId,
        target_date : date
    });
    return result;
}

//예측 결과 UI 렌더링
function renderResult(result){
    const pct = result.occupancy_pct; //혼잡도 %
    //혼잡도 단계 결정
    let colorClass, badgeClass, levelText;
    if      (pct <= 30) {colorClass = "bg-success"; badgeClass = "text-bg-success"; levelText = "여유"; }
    else if (pct <= 60) {colorClass = "bg-primary"; badgeClass = "text-bg-primary"; levelText = "보통"; }
    else if (pct <= 80) {colorClass = "bg-warning"; badgeClass = "text-bg-warning"; levelText = "혼잡"; }
    else                {colorClass = "bg-danger"; badgeClass = "text-bg-danger"; levelText = "매우혼잡"; }

    //DOM 업데이트
    document.querySelector("#resultLotName").textContent = result.lot_name;
    document.querySelector("#resultInfo").textContent = `${result.target_date} 총 ${result.capacity}면`

    //혼잡도 수치
    document.querySelector("#resultPct").textContent = `${pct}%`;
    document.querySelector("#resultPct").style.color =
        pct <= 60 ? "#198754" : pct <= 80 ? "#ffc107" : "#dc3545";

    //Badge 업데이트
    const badge = document.querySelector("#resultBadge");
    badge.textContent = levelText;
    badge.className = `badge fs-6 ${badgeClass}`;

    //Progress Bar 업데이트
    const bar = document.querySelector("#resultBar");
    bar.style.width         = `${pct}%`;                    // 막대 너비 = 혼잡도 %
    bar.setAttribute("aria-valuenow", pct);                 // 스크린 리더용 값 업데이트
    bar.className           = `progress-bar ${colorClass}`;
    bar.textContent         = `${pct}%`;                    // 막대 안 텍스트

    //잔여 면수, 총 면수
    document.querySelector("#resultSpaces").textContent = `${result.predicted_spaces}면`;
    document.querySelector("#resultCapacity").textContent = `${result.capacity}면`;

    //결과 카드 표시
    const card = document.querySelector("#resultCard");
    card.style.display = "block";
    //스크롤을 결과 카드로 이동
    card.scrollIntoView({behavior: "smooth", block: "start"});

}



document.addEventListener("DOMContentLoaded", () => {
    //페이지 초기화(드롭다운 옵션 생성 + url 파라미터 처리 + 날짜 설정)
    initPage();

    //예측 버튼 클릭 이벤트
    document.querySelector("#predictBtn").addEventListener("click", handlePredict);

    //날짜 입력 필드에서 Enter key -> 예측 실행
    document.querySelector("#dateInput").addEventListener("keydown", (e) => {
        if(e.key === "Enter") handlePredict();
    });

    //예약 버튼(로그인 상태일 때 예약 API 호출)
    document.querySelector("#reserveBtn").addEventListener("click", async () => {
        if(!isLoggedIn()) {
            //비로그인 상태 : 로그인 Modal 안내
            document.querySelector("#loginBtn").click();
            return;
        }
        if(!currentPrediction) return;
        try {
            //POST /reservations 호출
            await apiPost("/reservations", {
                lot_id          : currentPrediction.lot_id,
                reserved_date   : currentPrediction.target_date,
            });
            alert("예약이 완료되었습니다!\n내 예약 페이지에서 확인하세요.");
        } catch(error) {
            alert(`예약 실패 : ${error.message}`);
        }

    });

});
</script>
</body>
</html>
